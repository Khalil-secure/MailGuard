global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'mailguard-gateway'
    static_configs:
      - targets: ['gateway:3000']
    metrics_path: '/metrics'

  - job_name: 'mailguard-phishing-detector'
    static_configs:
      - targets: ['phishing-detector:8001']
    metrics_path: '/metrics'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
